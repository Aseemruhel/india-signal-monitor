<!--
  India Pulse 360 — Lock screen snippet.
  Drop this near the top of <body>, wrapping your existing dashboard
  markup inside #dashboard-root (which starts hidden).
  Include decrypt.js before the closing </body> tag.
-->

<div id="lock-screen" style="
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: #0f1115;
  font-family: -apple-system, Segoe UI, Roboto, sans-serif;
">
  <div style="
    width: 320px; padding: 32px 28px; border-radius: 10px;
    background: #1a1d23; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    text-align: center;
  ">
    <div style="font-size: 15px; letter-spacing: 0.06em; color: #8b93a1; margin-bottom: 4px;">
      INDIA PULSE 360
    </div>
    <h2 style="color: #f0f2f5; font-size: 18px; margin: 0 0 18px;">
      Enter password to continue
    </h2>
    <input
      type="password"
      id="dashboard-password"
      placeholder="Password"
      autocomplete="off"
      style="
        width: 100%; box-sizing: border-box; padding: 10px 12px;
        border-radius: 6px; border: 1px solid #383c46;
        background: #12141a; color: #f0f2f5; font-size: 14px;
        margin-bottom: 12px;
      "
    />
    <button
      id="unlock-btn"
      style="
        width: 100%; padding: 10px; border-radius: 6px; border: none;
        background: #3b6fd6; color: white; font-size: 14px; font-weight: 600;
        cursor: pointer;
      "
    >Unlock</button>
    <div id="unlock-error" style="color: #e15b5b; font-size: 13px; margin-top: 10px; min-height: 16px;"></div>
  </div>
</div>

<div id="dashboard-root" style="display:none;">
  <!-- Existing dashboard HTML goes here -->
</div>

<script src="decrypt.js"></script>
