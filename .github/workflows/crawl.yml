name: India Signal Monitor — Crawl

on:
  schedule:
    - cron: '0 */2 * * *'   # Every 2 hours (GitHub Actions free tier: 2000 min/month)
  workflow_dispatch:          # Manual trigger from GitHub UI

permissions:
  contents: write             # Needed to commit data/ back to repo

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run crawler
        run: python crawler.py

      - name: Commit updated data
        run: |
          git config user.name  "SignalBot"
          git config user.email "bot@signal-monitor.local"
          git add data/topics.json data/summary.json
          git diff --staged --quiet || git commit -m "📡 Signal update — $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

